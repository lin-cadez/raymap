
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TripLion | Road Trip. Reimagined.</title>
  <meta name="description" content="TripLion is an intelligent AI road trip planner. Discover places, plan the perfect route, and turn every mile into a clear itinerary." />
  <meta name="theme-color" content="#160d0a" />
  <meta property="og:title" content="TripLion | Road Trip. Reimagined." />
  <meta property="og:description" content="An intelligent AI road trip planner, coming soon." />
  <meta property="og:type" content="website" />
  <style>
    :root {
      --glow: #ff8a3d;
      --cream: #ffe0bd;
      --muted: rgba(255, 224, 189, .76);
      --line: rgba(255, 192, 130, .28);
      --dark: #160d0a;
      --dark-soft: rgba(22, 13, 10, .72);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--dark);
      color: var(--cream);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      overflow-x: hidden;
    }
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    linear-gradient(90deg, rgba(13, 8, 7, .88) 0%, rgba(28, 13, 8, .68) 42%, rgba(91, 38, 10, .18) 100%),
    linear-gradient(180deg, rgba(0, 0, 0, .12), rgba(0, 0, 0, .44)),
    url("assets/raymap-bg.png") center / cover no-repeat;
}
    body::after {
      content: "";
      position: fixed;
      right: clamp(-110px, -5vw, 0px);
      bottom: clamp(-120px, -7vw, -24px);
      z-index: 0;
      width: min(46vw, 560px);
      aspect-ratio: 1;
      background: url("assets/logo-lion.png") center / contain no-repeat;
      opacity: .12;
      filter: drop-shadow(0 0 44px rgba(255, 112, 50, .25));
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100svh;
      display: grid;
      place-items: center start;
      padding: clamp(28px, 6vw, 92px) clamp(20px, 11vw, 178px);
    }

    .content {
      width: min(700px, 92vw);
      text-align: center;
      animation: reveal 900ms ease-out both;
    }

    .mark {
      display: inline-grid;
      place-items: center;
      width: 72px;
      height: 72px;
      margin-bottom: clamp(18px, 2.8vw, 34px);
      border: 1px solid rgba(255, 203, 139, .42);
      border-radius: 18px;
      background: rgba(20, 11, 10, .58);
      box-shadow: 0 18px 48px rgba(0, 0, 0, .22), inset 0 1px 0 rgba(255, 255, 255, .08);
      backdrop-filter: blur(10px);
    }

    .mark img {
      width: 54px;
      height: 54px;
      display: block;
    }

    .brand {
      margin: 0;
      color: var(--glow);
      font-size: clamp(4.1rem, 8.6vw, 8.4rem);
      line-height: .86;
      font-weight: 900;
      letter-spacing: clamp(.08rem, .9vw, .72rem);
      text-shadow: 0 0 28px rgba(255, 104, 41, .2), 0 12px 42px rgba(0, 0, 0, .34);
    }

    .tagline {
      margin: clamp(24px, 3vw, 36px) 0 0;
      color: #ffb275;
      font-size: clamp(.95rem, 1.45vw, 1.36rem);
      font-weight: 900;
      letter-spacing: clamp(.28rem, 1vw, .76rem);
      text-transform: uppercase;
    }

    .pitch {
      width: min(560px, 100%);
      margin: clamp(22px, 2.7vw, 34px) auto 0;
      color: rgba(255, 236, 215, .86);
      font-size: clamp(1.02rem, 1.42vw, 1.3rem);
      line-height: 1.55;
      text-wrap: balance;
      text-shadow: 0 2px 14px rgba(0, 0, 0, .45);
    }

    .divider {
      width: min(650px, 100%);
      height: 1px;
      margin: clamp(32px, 4.2vw, 52px) auto 0;
      background: linear-gradient(90deg, transparent, var(--line) 18%, rgba(255, 181, 104, .54) 50%, var(--line) 82%, transparent);
      position: relative;
    }

    .divider::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 9px;
      height: 9px;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      background: #ff9149;
      box-shadow: 0 0 0 5px rgba(255, 145, 73, .12), 0 0 22px 7px rgba(255, 145, 73, .5);
      animation: pulse 2.2s ease-in-out infinite;
    }

    .soon {
      margin: clamp(20px, 2.6vw, 30px) 0 0;
      color: #ffb275;
      font-size: clamp(1rem, 1.55vw, 1.35rem);
      font-weight: 950;
      letter-spacing: clamp(.36rem, 1.14vw, .86rem);
      text-transform: uppercase;
    }

    .subcopy {
      margin: clamp(24px, 3vw, 34px) 0 16px;
      color: rgba(255, 236, 215, .84);
      font-size: clamp(1rem, 1.32vw, 1.2rem);
    }

    .signup {
      width: min(620px, 100%);
      margin: 0 auto;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 10px;
      width: 100%;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .email-input {
      width: 100%;
      min-height: 66px;
      border: 1px solid rgba(255, 226, 196, .42);
      border-radius: 15px;
      outline: none;
      background: rgba(20, 11, 10, .64);
      color: #fff3e4;
      padding: 0 27px;
      font: inherit;
      font-size: 1.04rem;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .02), 0 18px 42px rgba(0, 0, 0, .16);
      backdrop-filter: blur(10px);
      transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
    }

    .email-input::placeholder {
      color: rgba(255, 235, 214, .56);
    }

    .email-input:focus {
      border-color: rgba(255, 143, 70, .82);
      background: rgba(22, 11, 9, .78);
      box-shadow: 0 0 0 4px rgba(255, 143, 70, .12), 0 22px 54px rgba(0, 0, 0, .2);
    }

    .notify-button {
      min-height: 66px;
      border: 0;
      border-radius: 15px;
      cursor: pointer;
      color: white;
      font: inherit;
      font-weight: 950;
      letter-spacing: .08rem;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ff9d4f, #ff7032 45%, #ff8b3d);
      box-shadow: 0 18px 48px rgba(255, 102, 35, .28), inset 0 1px 0 rgba(255, 255, 255, .18);
      transition: transform .2s ease, filter .2s ease, box-shadow .2s ease;
    }

    .notify-button:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
      box-shadow: 0 24px 58px rgba(255, 102, 35, .36), inset 0 1px 0 rgba(255, 255, 255, .2);
    }

    .notify-button:disabled {
      opacity: .72;
      cursor: progress;
      transform: none;
    }

    .privacy,
    .status {
      margin: 13px 0 0;
      color: rgba(255, 224, 189, .68);
      font-size: .9rem;
    }

    .status {
      min-height: 1.3em;
      opacity: 0;
      transform: translateY(-2px);
      transition: opacity .2s ease, transform .2s ease;
    }

    .status.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .route-glow {
      position: fixed;
      z-index: 1;
      right: min(11vw, 130px);
      bottom: min(12vh, 130px);
      width: min(360px, 46vw);
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255, 138, 61, .72), transparent);
      box-shadow: 0 0 38px rgba(255, 113, 45, .42);
      transform: rotate(-12deg);
      pointer-events: none;
      animation: floatLight 4.5s ease-in-out infinite;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(3vh); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: .92; }
      50% { transform: translate(-50%, -50%) scale(1.32); opacity: 1; }
    }

    @keyframes floatLight {
      0%, 100% { transform: rotate(-12deg) translate3d(0, 0, 0); opacity: .56; }
      50% { transform: rotate(-12deg) translate3d(18px, -10px, 0); opacity: .94; }
    }

    @media (max-width: 760px) {
      body::after {
        width: 76vw;
        right: -28vw;
        bottom: -18vw;
        opacity: .08;
      }

      .page {
        min-height: 100svh;
        place-items: center;
        padding: 28px 20px;
      }

      .brand {
        font-size: clamp(3.25rem, 17vw, 5.15rem);
        letter-spacing: .05rem;
      }

      .tagline {
        letter-spacing: clamp(.18rem, 1.7vw, .5rem);
      }

      .pitch {
        font-size: .98rem;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .email-input,
      .notify-button {
        min-height: 56px;
      }
    }

    @media (max-height: 680px) and (min-width: 761px) {
      .brand { font-size: clamp(3.6rem, 7.2vw, 6.8rem); }
      .tagline { margin-top: 22px; }
      .pitch { margin-top: 18px; line-height: 1.42; }
      .divider { margin-top: 28px; }
      .soon { margin-top: 18px; }
      .subcopy { margin-top: 20px; }
      .email-input,
      .notify-button { min-height: 58px; }
      .page { min-height: 520px; }
    }
  </style>
</head>
<body>
  <main class="page" aria-label="TripLion coming soon teaser page">
    <section class="content">
      <span class="mark" aria-hidden="true">
        <img src="assets/logo-lion.png" alt="" />
      </span>
      <h1 class="brand">TripLion</h1>
      <p class="tagline">Road Trip. Reimagined.</p>

      <p class="pitch">
        An intelligent road trip planner that helps you discover stunning places,
        plan the perfect route, and turn every mile into a memory.
      </p>

      <div class="divider" aria-hidden="true"></div>

      <p class="soon">Coming Soon</p>
      <p class="subcopy">Be the first to plan your next adventure.</p>

      <form class="signup" action="https://formspree.io/f/mkoalrzq" method="POST" aria-label="TripLion newsletter form">
        <div class="form-row">
          <label class="sr-only" for="email">Your email</label>
          <input
            class="email-input"
            id="email"
            type="email"
            name="email"
            placeholder="Enter your email address"
            autocomplete="email"
            required
          />
          <input type="hidden" name="message" value="Notify me when TripLion launches." />
          <button class="notify-button" type="submit">Notify me</button>
        </div>
        <p class="privacy">We respect your privacy. No spam, ever.</p>
        <p class="status" id="form-status" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <span class="route-glow" aria-hidden="true"></span>
  <script>
    const signupForm = document.querySelector('.signup');
    const statusMessage = document.getElementById('form-status');
    const submitButton = signupForm.querySelector('button[type="submit"]');

    signupForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const formData = new FormData(signupForm);
      const originalButtonText = submitButton.textContent;

      statusMessage.classList.remove('is-visible');
      statusMessage.textContent = '';
      submitButton.disabled = true;
      submitButton.textContent = 'Sending...';

      try {
        const response = await fetch(signupForm.action, {
          method: 'POST',
          body: formData,
          headers: {
            Accept: 'application/json'
          }
        });

        if (!response.ok) {
          throw new Error('Form submission failed');
        }

        signupForm.reset();
        statusMessage.textContent = 'Thank you - you are on the list.';
        statusMessage.classList.add('is-visible');
      } catch (error) {
        statusMessage.textContent = 'Something went wrong. Please try again.';
        statusMessage.classList.add('is-visible');
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = originalButtonText;
      }
    });
  </script>
</body>
</html>
