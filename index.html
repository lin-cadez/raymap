<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RAYMAP — Road Trip. Reimagined.</title>
  <meta name="description" content="RAYMAP is an intelligent road trip planner. Discover stunning places, plan the perfect route, and turn every mile into a memory." />
  <meta name="theme-color" content="#160d0a" />
  <meta property="og:title" content="RAYMAP — Road Trip. Reimagined." />
  <meta property="og:description" content="An intelligent road trip planner, coming soon." />
  <meta property="og:type" content="website" />
  <style>
    :root {
      --glow: #ff8a3d;
      --glow-soft: rgba(255, 138, 61, .34);
      --cream: #ffe0bd;
      --muted: rgba(255, 224, 189, .74);
      --line: rgba(255, 192, 130, .27);
      --dark: #160d0a;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--dark);
      color: var(--cream);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("assets/raymap-bg.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transform: scale(1.012);
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 64% 42%, rgba(255, 203, 118, .16), transparent 23%),
        linear-gradient(90deg, rgba(13, 8, 7, .88) 0%, rgba(28, 13, 8, .62) 37%, rgba(91, 38, 10, .16) 70%, rgba(0, 0, 0, .24) 100%),
        linear-gradient(180deg, rgba(0, 0, 0, .18), rgba(0, 0, 0, .36));
    }

    .page {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100svh;
      min-height: 560px;
      display: grid;
      place-items: center start;
      padding: clamp(26px, 6vw, 96px) clamp(20px, 11vw, 178px);
    }

    .content {
      width: min(680px, 92vw);
      text-align: center;
      transform: translateY(1vh);
      animation: reveal 900ms ease-out both;
    }

    .brand {
      margin: 0;
      color: var(--glow);
      font-size: clamp(4.2rem, 8.8vw, 8.7rem);
      line-height: .84;
      font-weight: 800;
      letter-spacing: clamp(.32rem, 1.8vw, 1.45rem);
      text-indent: clamp(.32rem, 1.8vw, 1.45rem);
      text-shadow: 0 0 28px rgba(255, 104, 41, .18), 0 12px 42px rgba(0, 0, 0, .34);
    }

    .tagline {
      margin: clamp(26px, 3vw, 38px) 0 0;
      color: #ffb275;
      font-size: clamp(.95rem, 1.55vw, 1.45rem);
      font-weight: 800;
      letter-spacing: clamp(.34rem, 1.18vw, .9rem);
      text-indent: clamp(.34rem, 1.18vw, .9rem);
      text-transform: uppercase;
    }

    .pitch {
      width: min(550px, 100%);
      margin: clamp(22px, 2.7vw, 34px) auto 0;
      color: rgba(255, 236, 215, .84);
      font-size: clamp(1.02rem, 1.45vw, 1.32rem);
      line-height: 1.55;
      text-wrap: balance;
      text-shadow: 0 2px 14px rgba(0, 0, 0, .45);
    }

    .divider {
      width: min(650px, 100%);
      height: 1px;
      margin: clamp(32px, 4.4vw, 54px) auto 0;
      background: linear-gradient(90deg, transparent, var(--line) 18%, rgba(255, 181, 104, .52) 50%, var(--line) 82%, transparent);
      position: relative;
    }

    .divider::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 9px;
      height: 9px;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      background: #ff9149;
      box-shadow: 0 0 0 5px rgba(255, 145, 73, .12), 0 0 22px 7px rgba(255, 145, 73, .5);
      animation: pulse 2.2s ease-in-out infinite;
    }

    .soon {
      margin: clamp(20px, 2.6vw, 30px) 0 0;
      color: #ffb275;
      font-size: clamp(1rem, 1.55vw, 1.35rem);
      font-weight: 900;
      letter-spacing: clamp(.42rem, 1.35vw, .95rem);
      text-indent: clamp(.42rem, 1.35vw, .95rem);
      text-transform: uppercase;
    }

    .subcopy {
      margin: clamp(26px, 3.1vw, 36px) 0 16px;
      color: rgba(255, 236, 215, .83);
      font-size: clamp(1rem, 1.32vw, 1.22rem);
    }

    .signup {
      width: min(610px, 100%);
      margin: 0 auto;
    }

    .mailerlite-shell {
      min-height: 104px;
    }

    .mailerlite-shell .ml-embedded,
    .mailerlite-shell .ml-form-embedContainer,
    .mailerlite-shell .ml-form-align-center,
    .mailerlite-shell .ml-form-embedWrapper,
    .mailerlite-shell .ml-form-embedBody,
    .mailerlite-shell .ml-form-formContent,
    .mailerlite-shell form {
      width: 100% !important;
      max-width: 100% !important;
      margin: 0 !important;
      padding: 0 !important;
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
    }

    .mailerlite-shell .ml-form-embedContent,
    .mailerlite-shell .ml-form-embedPermissions,
    .mailerlite-shell .ml-form-successContent p,
    .mailerlite-shell .ml-form-successContent h4 {
      display: none !important;
    }

    .mailerlite-shell .ml-form-horizontalRow {
      display: grid !important;
      grid-template-columns: 1fr 220px !important;
      gap: 10px !important;
      width: 100% !important;
      height: auto !important;
      float: none !important;
    }

    .mailerlite-shell .ml-input-horizontal,
    .mailerlite-shell .ml-button-horizontal {
      width: auto !important;
      float: none !important;
      padding: 0 !important;
    }

    .mailerlite-shell .horizontal-fields,
    .mailerlite-shell .ml-field-group {
      width: 100% !important;
      padding: 0 !important;
      margin: 0 !important;
    }

    .mailerlite-shell input[type="email"] {
      width: 100% !important;
      min-height: 66px !important;
      border: 1px solid rgba(255, 226, 196, .42) !important;
      border-radius: 15px !important;
      outline: none !important;
      background: rgba(20, 11, 10, .64) !important;
      color: #fff3e4 !important;
      padding: 0 27px !important;
      font: inherit !important;
      font-size: 1.04rem !important;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .02), 0 18px 42px rgba(0, 0, 0, .16) !important;
      backdrop-filter: blur(10px) !important;
      transition: border-color .2s ease, box-shadow .2s ease, background .2s ease !important;
    }

    .mailerlite-shell input[type="email"]::placeholder {
      color: rgba(255, 235, 214, .56) !important;
    }

    .mailerlite-shell input[type="email"]:focus {
      border-color: rgba(255, 143, 70, .82) !important;
      background: rgba(22, 11, 9, .78) !important;
      box-shadow: 0 0 0 4px rgba(255, 143, 70, .12), 0 22px 54px rgba(0, 0, 0, .2) !important;
    }

    .mailerlite-shell button[type="submit"],
    .mailerlite-shell button.primary {
      width: 100% !important;
      min-height: 66px !important;
      border: 0 !important;
      border-radius: 15px !important;
      cursor: pointer !important;
      color: white !important;
      font: inherit !important;
      font-weight: 900 !important;
      letter-spacing: .12rem !important;
      text-transform: uppercase !important;
      background: linear-gradient(135deg, #ff9d4f, #ff7032 45%, #ff8b3d) !important;
      box-shadow: 0 18px 48px rgba(255, 102, 35, .28), inset 0 1px 0 rgba(255, 255, 255, .18) !important;
      transition: transform .2s ease, filter .2s ease, box-shadow .2s ease !important;
    }

    .mailerlite-shell button[type="submit"]:hover,
    .mailerlite-shell button.primary:hover {
      transform: translateY(-1px) !important;
      filter: brightness(1.06) !important;
      background: linear-gradient(135deg, #ff9d4f, #ff7032 45%, #ff8b3d) !important;
      box-shadow: 0 24px 58px rgba(255, 102, 35, .36), inset 0 1px 0 rgba(255, 255, 255, .2) !important;
    }

    .mailerlite-shell::after {
      content: "▣ We respect your privacy. No spam, ever.";
      display: block;
      min-height: 21px;
      margin: 17px 0 0;
      color: rgba(255, 221, 190, .58);
      font-size: .92rem;
      letter-spacing: .01em;
    }

    .mailerlite-shell .ml-form-successBody {
      padding: 0 !important;
      background: transparent !important;
    }

    .mailerlite-shell .ml-form-successBody::before {
      content: "Thank you — you are on the list.";
      display: block;
      color: #ffd6b0;
      font-size: 1rem;
      margin-top: 14px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 10px;
      align-items: stretch;
    }

    .email-input,
    .notify-button {
      min-height: 66px;
      border-radius: 15px;
      font: inherit;
    }

    .email-input {
      width: 100%;
      border: 1px solid rgba(255, 226, 196, .42);
      outline: none;
      background: rgba(20, 11, 10, .64);
      color: #fff3e4;
      padding: 0 27px;
      font-size: 1.04rem;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .02), 0 18px 42px rgba(0, 0, 0, .16);
      backdrop-filter: blur(10px);
      transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
    }

    .email-input::placeholder { color: rgba(255, 235, 214, .56); }

    .email-input:focus {
      border-color: rgba(255, 143, 70, .82);
      background: rgba(22, 11, 9, .78);
      box-shadow: 0 0 0 4px rgba(255, 143, 70, .12), 0 22px 54px rgba(0, 0, 0, .2);
    }

    .notify-button {
      border: 0;
      cursor: pointer;
      color: white;
      font-weight: 900;
      letter-spacing: .12rem;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ff9d4f, #ff7032 45%, #ff8b3d);
      box-shadow: 0 18px 48px rgba(255, 102, 35, .28), inset 0 1px 0 rgba(255, 255, 255, .18);
      transition: transform .2s ease, filter .2s ease, box-shadow .2s ease;
    }

    .notify-button:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
      box-shadow: 0 24px 58px rgba(255, 102, 35, .36), inset 0 1px 0 rgba(255, 255, 255, .2);
    }

    .notify-button:disabled {
      opacity: .72;
      cursor: progress;
    }

    .privacy,
    .status {
      min-height: 21px;
      margin: 17px 0 0;
      color: rgba(255, 221, 190, .58);
      font-size: .92rem;
      letter-spacing: .01em;
    }

    .privacy::before {
      content: "▣";
      color: #ff9d4f;
      margin-right: 10px;
      font-size: .8rem;
    }

    .status {
      display: none;
      color: #ffd6b0;
    }

    .status.is-visible { display: block; }

    .route-glow {
      position: fixed;
      left: 3vw;
      bottom: 8vh;
      z-index: 2;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ff8b3d;
      box-shadow: 0 0 20px 8px rgba(255, 139, 61, .32);
      opacity: .86;
      animation: floatLight 5.5s ease-in-out infinite;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(3vh); }
      to { opacity: 1; transform: translateY(1vh); }
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: .92; }
      50% { transform: translate(-50%, -50%) scale(1.32); opacity: 1; }
    }

    @keyframes floatLight {
      0%, 100% { transform: translate3d(0, 0, 0); opacity: .48; }
      50% { transform: translate3d(18px, -10px, 0); opacity: .92; }
    }

    @media (max-width: 760px) {
      body::before { background-position: 63% center; }

      body::after {
        background:
          linear-gradient(90deg, rgba(12, 7, 7, .91), rgba(29, 13, 8, .7) 58%, rgba(44, 16, 6, .42)),
          linear-gradient(180deg, rgba(0, 0, 0, .16), rgba(0, 0, 0, .46));
      }

      .page {
        place-items: center;
        padding: 24px 18px;
        min-height: 100svh;
      }

      .content { transform: none; }

      .brand {
        font-size: clamp(3.25rem, 17vw, 5.2rem);
        letter-spacing: clamp(.16rem, 1.7vw, .55rem);
        text-indent: clamp(.16rem, 1.7vw, .55rem);
      }

      .tagline,
      .soon {
        letter-spacing: .34rem;
        text-indent: .34rem;
      }

      .pitch { font-size: .98rem; }

      .form-row {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .email-input,
      .notify-button { min-height: 56px; }


      .mailerlite-shell .ml-form-horizontalRow {
        grid-template-columns: 1fr !important;
        gap: 10px !important;
      }

      .mailerlite-shell input[type="email"],
      .mailerlite-shell button[type="submit"],
      .mailerlite-shell button.primary {
        min-height: 56px !important;
      }
    }

    @media (max-height: 680px) and (min-width: 761px) {
      .brand { font-size: clamp(3.8rem, 7.4vw, 6.8rem); }
      .tagline { margin-top: 22px; }
      .pitch { margin-top: 18px; line-height: 1.42; }
      .divider { margin-top: 28px; }
      .soon { margin-top: 18px; }
      .subcopy { margin-top: 20px; }
      .email-input, .notify-button { min-height: 58px; }
      .page { min-height: 520px; }
    }
  </style>
</head>
<body>
  <main class="page" aria-label="RAYMAP coming soon teaser page">
    <section class="content">
      <h1 class="brand">RAYMAP</h1>
      <p class="tagline">Road Trip. Reimagined.</p>

      <p class="pitch">
        An intelligent road trip planner that helps you discover stunning places,
        plan the perfect route, and turn every mile into a memory.
      </p>

      <div class="divider" aria-hidden="true"></div>

      <p class="soon">Coming Soon</p>
      <p class="subcopy">Be the first to plan your next adventure.</p>

      <form class="signup" action="https://formspree.io/f/mkoalrzq" method="POST" aria-label="Email notification form">
        <div class="form-row">
          <label class="sr-only" for="email">Your email</label>
          <input
            class="email-input"
            id="email"
            type="email"
            name="email"
            placeholder="Enter your email address"
            autocomplete="email"
            required
          />
          <input type="hidden" name="message" value="Notify me when RAYMAP launches." />
          <button class="notify-button" type="submit">Notify me</button>
        </div>
        <p class="privacy">We respect your privacy. No spam, ever.</p>
        <p class="status" id="form-status" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <span class="route-glow" aria-hidden="true"></span>
  <script>
    const signupForm = document.querySelector('.signup');
    const statusMessage = document.getElementById('form-status');
    const submitButton = signupForm.querySelector('button[type="submit"]');

    signupForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const formData = new FormData(signupForm);
      const originalButtonText = submitButton.textContent;

      statusMessage.classList.remove('is-visible');
      statusMessage.textContent = '';
      submitButton.disabled = true;
      submitButton.textContent = 'Sending...';

      try {
        const response = await fetch(signupForm.action, {
          method: 'POST',
          body: formData,
          headers: {
            Accept: 'application/json'
          }
        });

        if (!response.ok) {
          throw new Error('Form submission failed');
        }

        signupForm.reset();
        statusMessage.textContent = 'Thank you — you are on the list.';
        statusMessage.classList.add('is-visible');
      } catch (error) {
        statusMessage.textContent = 'Something went wrong. Please try again.';
        statusMessage.classList.add('is-visible');
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = originalButtonText;
      }
    });
  </script>

</body>
</html>
